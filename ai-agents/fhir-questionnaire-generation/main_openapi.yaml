openapi: 3.0.1
info:
  title: Main Openapi Yaml
  version: 0.1.0
servers:
- url: "{server}:{port}/"
  variables:
    server:
      default: http://localhost
    port:
      default: "6080"
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Ok
          content:
            text/plain:
              schema:
                type: string
  /convert:
    post:
      operationId: postConvert
      requestBody:
        content:
          '*/*':
            schema:
              description: Any type of entity body
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConvertResponse'
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /questionnaires:
    get:
      operationId: getQuestionnaires
      parameters:
      - name: file_name
        in: query
        schema:
          type: string
          nullable: true
      - name: job_id
        in: query
        schema:
          type: string
          nullable: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
    post:
      operationId: postQuestionnaires
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionnaireUploadPayload'
        required: true
      responses:
        "201":
          description: Created
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /failedScenarios:
    get:
      operationId: getFailedscenarios
      parameters:
      - name: file_name
        in: query
        required: true
        schema:
          type: string
      - name: job_id
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /jobStatus:
    get:
      operationId: getJobstatus
      parameters:
      - name: file_name
        in: query
        required: true
        schema:
          type: string
      - name: job_id
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobMetadata'
        "404":
          description: NotFound
        "400":
          description: BadRequest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
components:
  schemas:
    ConvertResponse:
      required:
      - file_name
      - job_id
      - message
      - status
      type: object
      properties:
        job_id:
          type: string
        file_name:
          type: string
        status:
          type: string
        message:
          type: string
    ErrorPayload:
      required:
      - message
      - method
      - path
      - reason
      - status
      - timestamp
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
          format: int64
        reason:
          type: string
        message:
          type: string
        path:
          type: string
        method:
          type: string
    JobMetadata:
      required:
      - created_at
      - error_message
      - file_name
      - job_id
      - status
      type: object
      properties:
        job_id:
          type: string
        file_name:
          type: string
        status:
          type: string
        created_at:
          type: string
        error_message:
          type: string
          nullable: true
    QuestionnaireUploadPayload:
      required:
      - failed_scenarios
      - file_name
      - job_id
      - questionnaires
      type: object
      properties:
        file_name:
          type: string
        job_id:
          type: string
        questionnaires:
          type: object
        failed_scenarios:
          type: object

