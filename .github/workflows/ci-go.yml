name: CI (Go)

on:
  pull_request:
    types:
      - opened
      - synchronize

env:
  CONFORMANCE_PATTERN: conformance/*/*
  EHR_PATTERN: ehr-connectivity/*/*
  MISC_PATTERN: miscellaneous/*/*
  TRANSFORMATION_PATTERN: transformation/*/*
  GO_VERSION: '1.25'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      project-matrix: ${{ steps.unique-project-paths.outputs.GO_PROJECT_PATHS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Unique Go Project Paths from Changed Files
        id: unique-project-paths
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get changed files of PR from github API
          CHANGED_FILES=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!, $endCursor: String) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  files(first: 100, after: $endCursor) {
                    pageInfo{ hasNextPage, endCursor }
                    nodes {
                      path
                    }
                  }
                }
              }
            }' -F owner='wso2' -F repo='open-healthcare-prebuilt-services' -F pr=${{ github.event.pull_request.number }} --paginate --jq '.data.repository.pullRequest.files.nodes.[].path')
          echo "Changed Files:"
          echo "${CHANGED_FILES}"

          # Convert CHANGED_FILES to an array
          readarray -t CHANGED_FILES_ARRAY <<<"${CHANGED_FILES}"

          # Collect unique 2-level paths that contain a go.mod (Go module roots)
          declare -A UNIQUE_PATHS_MAP
          for file in "${CHANGED_FILES_ARRAY[@]}"; do
            EXTRACTED_PATH=""
            if [[ $file == $CONFORMANCE_PATTERN ]] || [[ $file == $EHR_PATTERN ]] || [[ $file == $MISC_PATTERN ]] || [[ $file == $TRANSFORMATION_PATTERN ]]; then
              EXTRACTED_PATH=$(echo "$file" | cut -d '/' -f 1-2)
              if [[ -f "$EXTRACTED_PATH/go.mod" ]]; then
                UNIQUE_PATHS_MAP[$EXTRACTED_PATH]=1
              fi
            fi
          done

          # Print the unique Go project paths
          echo "Extracted Unique Go Project Paths:"
          for EXTRACTED_PATH in "${!UNIQUE_PATHS_MAP[@]}"; do
            echo "$EXTRACTED_PATH"
          done

          # Create the JSON array with elements enclosed in double quotes
          UNIQUE_PATHS_JSON=$(for key in "${!UNIQUE_PATHS_MAP[@]}"; do echo "\"$key\""; done | jq -s -c .)
          echo "UNIQUE_PATHS_JSON:"
          echo "${UNIQUE_PATHS_JSON}"
          echo "GO_PROJECT_PATHS=${UNIQUE_PATHS_JSON}" >> $GITHUB_OUTPUT

  build:
    needs: [ setup ]
    runs-on: ubuntu-latest
    if: ${{ needs.setup.outputs.project-matrix != '[]' && needs.setup.outputs.project-matrix != '' }}
    strategy:
      matrix:
        path: ${{ fromJson(needs.setup.outputs.project-matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: '${{ matrix.path }}/go.sum'

      - name: Go Build
        run: |
          pushd "${{ matrix.path }}"
          go build ./...
          popd

      - name: Go Vet
        run: |
          pushd "${{ matrix.path }}"
          go vet ./...
          popd

  test:
    needs: [ setup ]
    runs-on: ubuntu-latest
    if: ${{ needs.setup.outputs.project-matrix != '[]' && needs.setup.outputs.project-matrix != '' }}
    strategy:
      matrix:
        path: ${{ fromJson(needs.setup.outputs.project-matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: '${{ matrix.path }}/go.sum'

      - name: Go Test (unit, race)
        run: |
          pushd "${{ matrix.path }}"
          go test -race -timeout=300s ./...
          popd

      - name: Go Test (integration, race)
        run: |
          pushd "${{ matrix.path }}"
          go test -tags=integration -race -timeout=600s ./...
          popd
